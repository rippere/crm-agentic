[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildArgs = { NEXT_PUBLIC_SUPABASE_URL = "$NEXT_PUBLIC_SUPABASE_URL", NEXT_PUBLIC_SUPABASE_ANON_KEY = "$NEXT_PUBLIC_SUPABASE_ANON_KEY", NEXT_PUBLIC_FASTAPI_URL = "$NEXT_PUBLIC_FASTAPI_URL" }

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
