version: '3.8'

x-api-env: &api-env
  SUPABASE_URL: ${SUPABASE_URL}
  DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-devpass}@postgres:5432/crmdb
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  SECRET_KEY: ${SECRET_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  REDIS_URL: redis://redis:6379/0
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
  SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
  HUNTER_API_KEY: ${HUNTER_API_KEY:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crmdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/migrations:/migrations:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-devpass}
    command: >
      psql -h postgres -U postgres -d crmdb
           -f /migrations/init_docker.sql
    restart: on-failure

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./apps/api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *api-env
    volumes:
      - audio_tmp:/tmp/crm_audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: ./apps/api
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      <<: *api-env
    volumes:
      - audio_tmp:/tmp/crm_audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build: ./apps/api
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_FASTAPI_URL: ${NEXT_PUBLIC_FASTAPI_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    depends_on:
      - api

volumes:
  postgres_data:
  audio_tmp:
