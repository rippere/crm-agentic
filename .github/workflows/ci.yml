name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: TypeScript type-check + build
  # ──────────────────────────────────────────────────────────────────────────
  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_FASTAPI_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"

  # ──────────────────────────────────────────────────────────────────────────
  # Backend: Python tests (295 tests, no real credentials needed)
  # ──────────────────────────────────────────────────────────────────────────
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('apps/api/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn sqlalchemy asyncpg pyjwt cryptography \
            celery httpx anthropic python-dotenv pydantic-settings \
            pydantic pgvector slowapi \
            pytest pytest-asyncio anyio

      - name: Run tests
        run: python -m pytest -q --tb=short
        # conftest.py at apps/api/ injects all required env vars before
        # app modules are imported, so no real credentials are needed.

  # ──────────────────────────────────────────────────────────────────────────
  # E2E: Playwright smoke tests in demo mode
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app (demo mode)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_FASTAPI_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_FASTAPI_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
